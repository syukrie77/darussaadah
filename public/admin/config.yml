backend:
  name: git-gateway
  branch: main
  site_url: https://school-freewebsite.netlify.app/
  admin_path: admin

# Aktif saat development lokal — hapus atau set false saat deploy ke Netlify
# local_backend: true
# local_backend:
# url: http://localhost:8081/api/v1



media_folder: "public/uploads"
public_folder: "/uploads"

collections:

  # ─── BERITA / BLOG ────────────────────────────────────────────────────────
  - name: "berita"
    label: "Berita Sekolah"
    folder: "src/content/berita"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Deskripsi", name: "description", widget: "text" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Penulis", name: "author", widget: "string", default: "Admin Sekolah" }
      - { label: "Gambar", name: "image", widget: "image", required: false }
      - { label: "Isi Berita", name: "body", widget: "markdown" }

  # ─── PENGATURAN SITUS (FILE COLLECTIONS) ─────────────────────────────────
  - name: "settings"
    label: "Pengaturan Situs"
    editor:
      preview: false
    files:

      # --- UMUM: Nama, Logo, SEO ---
      - name: "site"
        label: "Umum (Nama Sekolah & Logo)"
        file: "src/data/site.json"
        format: "json"
        fields:
          - { label: "Nama Sekolah", name: "name", widget: "string", hint: "Tampil di navbar dan judul browser" }
          - { label: "Tagline", name: "tagline", widget: "string", hint: "Kalimat singkat di bawah nama sekolah" }
          - { label: "Logo Sekolah", name: "logo", widget: "image", hint: "Upload logo PNG/JPG. Ukuran rekomendasi: 200x200px" }
          - { label: "Deskripsi SEO", name: "description", widget: "text", hint: "Teks yang muncul di hasil pencarian Google" }
          - { label: "Gambar Share (OG Image)", name: "og_image", widget: "image", required: false, hint: "Gambar yang muncul saat link dibagikan ke media sosial" }

      # --- HERO / BANNER UTAMA ---
      - name: "hero"
        label: "Hero / Banner Halaman Utama"
        file: "src/data/hero.json"
        format: "json"
        fields:
          - { label: "Judul Utama", name: "title", widget: "string", hint: "Teks besar di bagian atas halaman" }
          - { label: "Subtitle / Tagline", name: "subtitle", widget: "text", hint: "Kalimat penjelasan di bawah judul" }
          - { label: "Teks Tombol", name: "cta_text", widget: "string", hint: "Label tombol CTA, contoh: Daftar PPDB Sekarang" }
          - { label: "Link Tombol", name: "cta_url", widget: "string", hint: "URL tujuan tombol, contoh: /ppdb atau https://wa.me/628xxx" }

      # --- FOOTER ---
      - name: "footer"
        label: "Footer"
        file: "src/data/footer.json"
        format: "json"
        fields:
          - { label: "Teks Tentang Sekolah", name: "about", widget: "text", hint: "Deskripsi singkat sekolah di footer" }
          - { label: "Alamat", name: "address", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Nomor Telepon", name: "phone", widget: "string", hint: "Contoh: 0818 0840 2439 / 0851 7172 5259" }
          - { label: "Nama Hak Cipta (Copyright)", name: "copyright", widget: "string" }

      # --- HALAMAN BERANDA ---
      - name: "homepage"
        label: "Halaman Beranda"
        file: "src/data/homepage.json"
        format: "json"
        fields:
          - { label: "Judul Bagian Tentang", name: "about_title", widget: "string" }
          - { label: "Teks Tentang Sekolah", name: "about_text", widget: "text" }
          - { label: "Foto Gedung / Sekolah", name: "school_image", widget: "image" }
          - { label: "Judul Program Unggulan", name: "programs_title", widget: "string" }
          - label: "Program Unggulan"
            name: "programs"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Nama Program", name: "title", widget: "string" }
              - { label: "Deskripsi", name: "description", widget: "text" }
          - { label: "Judul CTA PPDB", name: "ppdb_title", widget: "string" }
          - { label: "Subtitle CTA PPDB", name: "ppdb_subtitle", widget: "text" }
          - { label: "Nomor WhatsApp PPDB (tanpa + atau spasi)", name: "ppdb_wa", widget: "string", hint: "Contoh: 6285312261634" }
          - { label: "Teks Tombol PPDB", name: "ppdb_button_text", widget: "string" }

      # --- HALAMAN PROFIL ---
      - name: "profil"
        label: "Halaman Profil Sekolah"
        file: "src/data/profil.json"
        format: "json"
        fields:
          - { label: "Paragraf Perkenalan 1", name: "intro1", widget: "text" }
          - { label: "Paragraf Perkenalan 2", name: "intro2", widget: "text" }
          - { label: "NPSN", name: "npsn", widget: "string" }
          - { label: "Status Sekolah", name: "status", widget: "string", hint: "Contoh: Swasta / Negeri" }
          - { label: "Akreditasi", name: "akreditasi", widget: "string", hint: "Contoh: A / B / C" }
          - { label: "Tahun Berdiri", name: "tahun_berdiri", widget: "string" }
          - { label: "Foto Kepala Sekolah", name: "kepala_sekolah_foto", widget: "image" }
          - { label: "Nama Kepala Sekolah", name: "kepala_sekolah_nama", widget: "string" }
          - { label: "Sambutan Kepala Sekolah", name: "sambutan", widget: "text", hint: "Pisahkan paragraf dengan baris kosong" }
          - { label: "Visi Sekolah", name: "visi", widget: "text" }
          - label: "Misi Sekolah"
            name: "misi"
            widget: "list"
            hint: "Klik + untuk menambah poin misi baru"
            field: { label: "Poin Misi", name: "item", widget: "string" }

      # --- HALAMAN PPDB ---
      - name: "ppdb"
        label: "Halaman PPDB"
        file: "src/data/ppdb.json"
        format: "json"
        fields:
          - { label: "Judul Halaman", name: "title", widget: "string" }
          - { label: "Tahun Ajaran", name: "tahun_ajaran", widget: "string", hint: "Contoh: 2025 / 2026" }
          - { label: "Subtitle / Deskripsi", name: "subtitle", widget: "text" }
          - label: "Keunggulan Sekolah"
            name: "highlights"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Ikon (emoji)", name: "icon", widget: "string", hint: "Tempel emoji, contoh: 🎓" }
              - { label: "Judul", name: "title", widget: "string" }
              - { label: "Deskripsi Singkat", name: "desc", widget: "string" }
          - label: "Alur Pendaftaran"
            name: "alur"
            widget: "list"
            hint: "Langkah-langkah pendaftaran secara berurutan"
            field: { label: "Langkah", name: "item", widget: "string" }
          - { label: "Nomor WhatsApp (tanpa + atau spasi)", name: "wa_number", widget: "string", hint: "Contoh: 6285171725259" }
          - { label: "Teks Tombol Daftar", name: "button_text", widget: "string" }
